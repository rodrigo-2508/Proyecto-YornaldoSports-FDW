<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yornaldo Sport - Home</title>

    <link rel="icon" type="image/png" href="img/y7.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <script>
        if (!sessionStorage.getItem('invitado') && !localStorage.getItem('usuarioRegistrado')) {
            window.location.href = 'html/registro.html';
        }
    </script>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="img/y7.png" alt="Y7 Logo" height="35" class="me-2">
                <span class="fw-bold tracking-wider fs-5">YORNALDO SPORT</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarYornaldo">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navbarYornaldo">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link text-white fw-bold" href="html/productos.html">Productos</a></li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-3">
                <div class="input-group d-none d-md-flex" style="width: 180px;">
                    <input type="text" class="form-control form-control-sm bg-white text-dark border-end-0" placeholder="Buscar">
                    <span class="input-group-text bg-white text-dark border-start-0"><i class="bi bi-search"></i></span>
                </div>
                <a href="html/carrito.html" class="text-white fs-4"><i class="bi bi-cart3"></i></a>
                <a href="html/favoritos.html" class="text-white fs-4"><i class="bi bi-heart"></i></a>
                <a href="html/cuenta.html" class="text-white fs-4" title="Mi Cuenta"><i class="bi bi-person-circle"></i></a>
                <a href="html/configuracion.html" class="text-white fs-4" title="Configuración"><i class="bi bi-gear"></i></a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h2 class="text-center mb-4">Bienvenido a Yornaldo Sport</h2>
        
        <div id="carruselYornaldo" class="carousel slide mb-5 shadow-sm rounded overflow-hidden" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carruselYornaldo" data-bs-slide-to="0" class="active" aria-current="true"></button>
                <button type="button" data-bs-target="#carruselYornaldo" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carruselYornaldo" data-bs-slide-to="2"></button>
            </div>
            
            <div class="carousel-inner" style="background-color: #ededed;">
                <div class="carousel-item active" style="height: 400px;">
                    <img src="img/calentadoresy7.png" class="d-block mx-auto h-100 w-auto p-4 object-fit-contain" alt="Calentadores">
                </div>
                <div class="carousel-item" style="height: 400px;">
                    <img src="img/creadory7.png" class="d-block mx-auto h-100 w-auto p-4 object-fit-contain" alt="Creador Y7">
                </div>
                <div class="carousel-item" style="height: 400px;">
                    <img src="img/shorts_deportivosy7.png" class="d-block mx-auto h-100 w-auto p-4 object-fit-contain" alt="Shorts Deportivos">
                </div>
            </div>
            
            <button class="carousel-control-prev" type="button" data-bs-target="#carruselYornaldo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon bg-black rounded-circle p-3" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carruselYornaldo" data-bs-slide="next">
                <span class="carousel-control-next-icon bg-black rounded-circle p-3" aria-hidden="true"></span>
                <span class="visually-hidden">Siguiente</span>
            </button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/tema.js"></script>
</body>
</html>
