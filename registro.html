<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | Yornaldo Sport</title>

    <link rel="icon" type="image/png" href="../img/y7.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <img src="../img/y7.png" alt="Y7 Logo" height="35" class="me-2">
                <span class="fw-bold tracking-wider fs-5">YORNALDO SPORT</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarYornaldo">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navbarYornaldo">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link text-white" href="mujer.html">Mujer</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="hombre.html">Hombre</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="ninos.html">Niños</a></li>
                    <li class="nav-item"><a class="nav-link text-white fw-bold active" href="productos.html">Productos</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="descuentos.html">Descuentos</a></li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-3">
                <div class="input-group d-none d-md-flex" style="width: 180px;">
                    <input type="text" class="form-control form-control-sm bg-white text-dark border-end-0" placeholder="Buscar">
                    <span class="input-group-text bg-white text-dark border-start-0"><i class="bi bi-search"></i></span>
                </div>
                
                <a href="#carritoCompras" class="text-white fs-4 position-relative">
                    <i class="bi bi-cart3"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">
                        0
                    </span>
                </a>
                
                <a href="favoritos.html" class="text-white fs-4"><i class="bi bi-heart"></i></a>
                <a href="cuenta.html" class="text-white fs-4" title="Mi Cuenta"><i class="bi bi-person-circle"></i></a>
                <a href="configuracion.html" class="text-white fs-4" title="Configuración"><i class="bi bi-gear"></i></a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h2 class="fw-bold mb-5">Productos</h2>

        <div class="row g-4">
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card producto-card h-100 border-0 shadow-sm">
                    <img src="../img/calentadoresy7.png" class="card-img-top p-3" alt="Calentadores">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Calentadores</h6>
                        <p class="text-muted">S/ 35.00</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-outline-dark btn-sm">Ver</button>
                            <button class="btn btn-dark btn-sm"><i class="bi bi-cart-plus"></i> Agregar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card producto-card h-100 border-0 shadow-sm">
                    <img src="../img/shorts_deportivosy7.png" class="card-img-top p-3" alt="Short Bermuda">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Short Bermuda</h6>
                        <p class="text-muted">S/ 30.00</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-outline-dark btn-sm">Ver</button>
                            <button class="btn btn-dark btn-sm"><i class="bi bi-cart-plus"></i> Agregar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card producto-card h-100 border-0 shadow-sm">
                    <img src="../img/pantalonescalentadoresy7.png" class="card-img-top p-3" alt="Pantalon Calentador">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Pantalon Calentador</h6>
                        <p class="text-muted">S/ 35.00</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-outline-dark btn-sm">Ver</button>
                            <button class="btn btn-dark btn-sm"><i class="bi bi-cart-plus"></i> Agregar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card producto-card h-100 border-0 shadow-sm">
                    <img src="../img/bolsos_deportivosy7.png" class="card-img-top p-3" alt="Bolsos Deportivos">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Bolsos Deportivos</h6>
                        <p class="text-muted">S/ 26.00</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-outline-dark btn-sm">Ver</button>
                            <button class="btn btn-dark btn-sm"><i class="bi bi-cart-plus"></i> Agregar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card producto-card h-100 border-0 shadow-sm">
                    <img src="../img/calcetasy7.png" class="card-img-top p-3" alt="Medias Deportivas">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Medias Deportivas</h6>
                        <p class="text-muted">S/ 15.00</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-outline-dark btn-sm">Ver</button>
                            <button class="btn btn-dark btn-sm"><i class="bi bi-cart-plus"></i> Agregar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card producto-card h-100 border-0 shadow-sm">
                    <img src="../img/camisetas_deportivasy7.png" class="card-img-top p-3" alt="Polos deportivos">
                    <div class="card-body text-center">
                        <h6 class="fw-bold">Polos deportivos</h6>
                        <p class="text-muted">S/ 25.00</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-outline-dark btn-sm">Ver</button>
                            <button class="btn btn-dark btn-sm" onclick="agregarProducto('Polosdeportivos',25)">
                                <i class="bi bi-cart-plus"></i> Agregar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="container mb-5" id="carritoCompras">
        <div class="card p-4 shadow-sm border-0">
            <h3>Carrito</h3>
            <div id="carrito">
                <p class="text-muted">Tu carrito está vacío</p>
            </div>
            <h4 class="mt-3">Total: S/ <span id="total">0</span></h4>
            <div class="mt-3">
                <button class="btn btn-danger" onclick="vaciarCarrito()">Vaciar carrito</button>
                <button class="btn btn-success">Comprar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
