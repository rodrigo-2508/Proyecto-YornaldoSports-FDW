<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - Yornaldo Sports</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <img src="../img/y7.png" alt="Logo Yornaldo Sports" height="35" class="me-2">
                <span class="fw-bold text-dark">YORNALDO SPORT</span>
            </a>
            <a href="../index.html" class="btn btn-outline-dark btn-sm rounded-pill px-3">
                <i class="fa-solid fa-house me-1"></i> Tienda
            </a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row">
            <h2 class="fw-bold mb-4">Configuración General</h2>
            
            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card border-0 shadow-sm p-2 tarjeta-menu">
                    <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                        <button class="nav-link active text-start p-3 mb-1" id="tab-seguridad" data-bs-toggle="pill" data-bs-target="#contenido-seguridad" type="button" role="tab">
                            <i class="fa-solid fa-lock me-2 text-danger"></i> Contraseña y Seguridad
                        </button>
                        <button class="nav-link text-start p-3 mb-1" id="tab-direcciones" data-bs-toggle="pill" data-bs-target="#contenido-direcciones" type="button" role="tab">
                            <i class="fa-solid fa-truck-fast me-2 text-success"></i> Direcciones de Envío
                        </button>
                        <button class="nav-link text-start p-3 mb-1" id="tab-deportes" data-bs-toggle="pill" data-bs-target="#contenido-deportes" type="button" role="tab">
                            <i class="fa-solid fa-dumbbell me-2 text-warning"></i> Preferencias Deportivas
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-8 col-lg-9">
                <div class="tab-content bg-white p-4 rounded shadow-sm" id="v-pills-tabContent">
                    
                    <div class="tab-pane fade show active" id="contenido-seguridad" role="tabpanel">
                        <h4 class="mb-4">Actualizar Contraseña</h4>
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Contraseña Actual</label>
                                <input type="password" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nueva Contraseña</label>
                                <input type="password" class="form-control">
                            </div>
                            <button type="button" class="btn btn-dark">Guardar Cambios</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="contenido-direcciones" role="tabpanel">
                        <h4 class="mb-4">Direcciones Guardadas</h4>
                        <p class="text-muted">No tienes direcciones guardadas aún.</p>
                        <button class="btn btn-outline-dark"><i class="bi bi-plus-lg"></i> Agregar Dirección</button>
                    </div>

                    <div class="tab-pane fade" id="contenido-deportes" role="tabpanel">
                        <h4 class="mb-4">Deportes Favoritos</h4>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="deporte1" checked>
                            <label class="form-check-label" for="deporte1">Fútbol</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="deporte2">
                            <label class="form-check-label" for="deporte2">Running</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="deporte3">
                            <label class="form-check-label" for="deporte3">Gimnasio</label>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
